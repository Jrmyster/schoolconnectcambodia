kind = "web"
previewPath = "/"
title = "Chuy Sala - Help School"
version = "1.0.0"
id = "artifacts/chuy-sala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26043
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chuy-sala run dev"

[services.env]
PORT = "26043"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chuy-sala", "run", "build"]
publicDir = "artifacts/chuy-sala/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
